<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuindioFlix — Prototipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app-consumer.jsx"></script>
<script type="text/babel" src="app-staff.jsx"></script>
<script type="text/babel" src="app-auth.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState: useStateR, useEffect: useEffectR } = React;

// ---------- Root ----------
// Flujo: landing → (login | register) → app por rol
function Root() {
  // route: "landing" | "login" | "register" | "app"
  const [route, setRoute] = useStateR("landing");
  const [session, setSession] = useStateR(null); // { email, role, nombre, ... }

  // Persistir sesión en localStorage para que sobreviva al refresh
  useEffectR(() => {
    try {
      const saved = localStorage.getItem("qf_session");
      if (saved) {
        const s = JSON.parse(saved);
        setSession(s);
        setRoute("app");
      }
    } catch {}
  }, []);

  const persist = (s) => {
    setSession(s);
    setRoute("app");
    try { localStorage.setItem("qf_session", JSON.stringify(s)); } catch {}
  };
  const logout = () => {
    setSession(null);
    setRoute("landing");
    try { localStorage.removeItem("qf_session"); } catch {}
  };

  return (
    <ToastProvider>
      {route === "landing" && <Landing onLogin={() => setRoute("login")} onRegister={() => setRoute("register")}/>}
      {route === "login" && <LoginPage onSuccess={persist} onRegister={() => setRoute("register")} onBack={() => setRoute("landing")}/>}
      {route === "register" && <RegisterPage onSuccess={persist} onLogin={() => setRoute("login")} onBack={() => setRoute("landing")}/>}
      {route === "app" && session && (
        <>
          {session.role === "consumer" && <ConsumerApp onLogout={logout}/>}
          {session.role === "content" && <ContentApp onLogout={logout}/>}
          {session.role === "moderator" && <ModeratorApp onLogout={logout}/>}
          {session.role === "management" && <ManagementApp onLogout={logout}/>}
          {session.role === "dba" && <DbaApp onLogout={logout}/>}
        </>
      )}
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>

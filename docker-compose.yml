services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: quindioflix-oracle
    ports:
      - "1522:1521"
      - "5500:5500"
    env_file:
      - db/.env
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    networks:
      - quindioflix-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quindioflix-backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - quindioflix-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quindioflix-frontend
    ports:
      - "5000:5000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - quindioflix-network

volumes:
  oracle-data:

networks:
  quindioflix-network:
    driver: bridge
